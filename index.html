<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftie's Birthday Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Taylor's Birthday Puzzle</h1>
        <div id="quiz">
            <h2 id="question"></h2>
            <div id="choices"></div>
            <button id="submit">Submit</button>
        </div>
        <div id="result"></div>
        <div id="secret-code-display">Secret Code: <span id="code"></span></div>
        <div id="code-input" style="display:none;">
            <input type="text" id="secret-code" placeholder="Enter the secret code">
            <button id="reveal-message">Reveal Message</button>
        </div>
        <div id="birthday-message" style="display:none;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
